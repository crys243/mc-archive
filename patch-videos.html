<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Patch vidéos — M&C</title>
<style>
  body { font-family: monospace; background: #111; color: #7aab7a; padding: 2rem; line-height: 1.6; }
  h1 { color: #e8ede8; margin-bottom: 0.5rem; font-size: 1.2rem; }
  p { color: #6a876a; font-size: 0.85rem; margin-bottom: 1.5rem; }
  button { background: #7aab7a; color: #111; border: none; padding: 0.75rem 2rem; font-size: 1rem; cursor: pointer; border-radius: 2px; margin-bottom: 1.5rem; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #log { white-space: pre-wrap; font-size: 0.85rem; }
  .ok { color: #7aab7a; } .err { color: #e74c3c; } .info { color: #c8d4c8; } .done { color: #f1c40f; font-weight: bold; }
</style>
</head>
<body>
<h1>🔧 Patch miniatures vidéos v2 — M&C</h1>
<p>Corrige les URLs de miniatures pour toutes les vidéos.</p>
<button id="runBtn" onclick="run()">Lancer le patch</button>
<div id="log"></div>
<script>
const CLD_CLOUD   = "dayi1mq7p";
const JSONBIN_ID  = "6a013aaec0954111d805bf21";
const JSONBIN_KEY = "$2a$10$4Hz/UUK6RZsvPvHvLOfre..2w/um9CLvVlTxkD/DMATQltcgbIq1y";
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

function log(msg, cls='info') {
  document.getElementById('log').innerHTML += `<span class="${cls}">${msg}</span>\n`;
}

function extractPublicId(url) {
  if (!url) return null;
  // Gérer les URLs avec version: /upload/v1234567890/public_id.ext
  // et sans version: /upload/public_id.ext
  // et avec transformations: /upload/q_auto,f_auto/v123/public_id.ext
  const match = url.match(/\/(?:video|image)\/upload\/(?:[^/]+\/)*?(v\d+\/)?([^/?#.]+(?:\/[^/?#.]+)*)(?:\.[^./?#]+)?(?:[?#].*)?$/);
  if (!match) return null;
  return (match[1] || '') + match[2];
}

async function run() {
  document.getElementById('runBtn').disabled = true;
  log('=== Démarrage du patch v2 ===\n', 'done');

  log('1. Chargement JSONBin…');
  let albumData;
  try {
    const res = await fetch(`${JSONBIN_URL}/latest`, { headers: { 'X-Master-Key': JSONBIN_KEY } });
    if (!res.ok) { log('Erreur: ' + res.status, 'err'); return; }
    albumData = (await res.json()).record;
    log(`   ✓ ${Object.keys(albumData).length} années chargées`, 'ok');
  } catch(e) { log('Erreur: ' + e.message, 'err'); return; }

  log('\n2. Reconstruction des miniatures…');
  let patched = 0;

  Object.keys(albumData).forEach(year => {
    (albumData[year]?.medias || []).forEach((media, i) => {
      if (!media || media.type !== 'video') return;

      const pid = media.publicId || extractPublicId(media.src);
      if (!pid) { log(`   ? [${year}] Impossible d'extraire: ${(media.src||'').slice(0,60)}`, 'err'); return; }

      // Mettre à jour publicId si manquant
      if (!media.publicId) albumData[year].medias[i].publicId = pid;

      // Toujours reconstruire le thumb proprement
      const newThumb = `https://res.cloudinary.com/${CLD_CLOUD}/video/upload/q_auto,f_jpg,w_500,so_0/${pid}.jpg`;

      if (albumData[year].medias[i].thumb !== newThumb) {
        albumData[year].medias[i].thumb = newThumb;
        log(`   ✓ [${year}] ${pid}`, 'ok');
        patched++;
      }
    });
  });

  log(`\n   Mises à jour: ${patched}`, 'done');

  if (patched > 0) {
    log('\n3. Sauvegarde JSONBin…');
    try {
      const res = await fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
        body: JSON.stringify(albumData)
      });
      if (res.ok) log('   ✓ Sauvegardé !', 'ok');
      else log('   Erreur: ' + res.status, 'err');
    } catch(e) { log('Erreur: ' + e.message, 'err'); }
  } else {
    log('\n3. Rien à sauvegarder.', 'info');
  }

  log('\n=== Terminé — ferme cette page ===', 'done');
  document.getElementById('runBtn').disabled = false;
}
</script>
</body>
</html>
